<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#111622"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shield outline -->
  <path d="M32 8 L50 16 L50 34 C50 44 32 56 32 56 C32 56 14 44 14 34 L14 16 Z" stroke="url(#glow)" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Glow blur behind mic -->
  <circle cx="32" cy="30" r="10" fill="#3b82f6" opacity="0.15" filter="url(#blur)"/>
  <!-- Mic body -->
  <rect x="28" y="18" width="8" height="14" rx="4" fill="url(#glow)"/>
  <!-- Mic arc -->
  <path d="M22 30 C22 38 42 38 42 30" stroke="url(#glow)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="32" y1="38" x2="32" y2="44" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="44" x2="38" y2="44" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sound waves -->
  <path d="M18 26 C16 28 16 32 18 34" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M15 22 C11 26 11 34 15 38" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M46 26 C48 28 48 32 46 34" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M49 22 C53 26 53 34 49 38" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>